<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Customer Service</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <h1>Negocio AI</h1>
        <nav>
          <a href="#">Inbox</a>
          <a href="#">Leads</a>
          <a href="#">Clientes</a>
        </nav>
      </aside>

      <main class="content">
        <header class="topbar">
          <h2>Inbox de conversaciones</h2>
          <button id="loadBtn">Cargar conversaciones</button>
        </header>

        <section class="workspace">
          <div id="conversationList" class="panel conversation-list-panel">
            Todavía no cargaste conversaciones.
          </div>

          <div id="chatDetail" class="panel chat-detail">
            <p>Seleccioná una conversación para ver el detalle.</p>
          </div>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
