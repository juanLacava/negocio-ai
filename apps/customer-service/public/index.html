<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Customer Service</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <h1>Negocio AI</h1>
        <nav>
          <a href="#">Inbox</a>
          <a href="#">Leads</a>
          <a href="#">Clientes</a>
        </nav>
      </aside>

      <main class="content">
        <header class="topbar">
          <h2>Inbox de conversaciones</h2>
          <button id="loadBtn">Cargar conversaciones</button>
        </header>

        <section class="workspace">
          <div class="panel conversation-list-panel">
            <div class="filters">
              <div class="filter-group">
                <label for="channelFilter">Canal</label>
                <select id="channelFilter">
                  <option value="all">Todos</option>
                  <option value="whatsapp">WhatsApp</option>
                  <option value="instagram">Instagram</option>
                  <option value="telegram">Telegram</option>
                </select>
              </div>

              <div class="filter-group">
                <label for="statusFilter">Estado</label>
                <select id="statusFilter">
                  <option value="all">Todos</option>
                  <option value="new">Nuevo</option>
                  <option value="pending">Pendiente</option>
                  <option value="interested">Interesado</option>
                  <option value="closed">Cerrado</option>
                  <option value="answered">Respondido</option>
                </select>
              </div>
            </div>

            <div id="conversationList">
              Todavía no cargaste conversaciones.
            </div>
          </div>

          <div id="chatDetail" class="panel chat-detail">
            <p>Seleccioná una conversación para ver el detalle.</p>
          </div>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
